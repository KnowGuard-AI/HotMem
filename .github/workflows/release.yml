name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.6"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build
        run: uv build

      - name: Verify package metadata
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          uvx twine check dist/*
          python - <<'PY'
          import os
          import pathlib
          import re
          import tarfile
          import tomllib

          readme = pathlib.Path("README.md").read_text()
          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          project_version = pyproject["project"]["version"]
          init_text = pathlib.Path("src/hotmem/__init__.py").read_text()
          init_version = re.search(r'__version__ = "([^"]+)"', init_text).group(1)
          release_tag = os.environ["RELEASE_TAG"]

          if release_tag != f"v{project_version}":
              raise SystemExit(
                  f"release tag {release_tag} does not match pyproject version {project_version}"
              )
          if init_version != project_version:
              raise SystemExit(
                  f"hotmem.__version__ {init_version} does not match pyproject version {project_version}"
              )

          sdist = next(pathlib.Path("dist").glob("*.tar.gz"))

          with tarfile.open(sdist) as tar:
              member = next(m for m in tar.getmembers() if m.name.endswith("/PKG-INFO"))
              metadata = tar.extractfile(member).read().decode()

          if readme.strip() not in metadata:
              raise SystemExit("README.md was not embedded in package metadata")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 ||
            gh release create "$RELEASE_TAG" --verify-tag --generate-notes
