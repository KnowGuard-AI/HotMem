name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v4
      - run: uv venv
      - run: uv pip install -e ".[dev,mcp]"
      - run: uv run ruff check src/ tests/ examples/
      - run: uv run ruff format --check src/ tests/ examples/
      - run: uv run pytest --cov=hotmem --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  adapters:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v4
      - run: uv venv
      - run: uv pip install -e ".[dev,mcp]"
      - name: Install adapters
        run: |
          uv pip install -e adapters/langchain
          uv pip install -e adapters/crewai
          uv pip install -e adapters/autogen
          uv pip install -e adapters/pydanticai
          uv pip install -e adapters/hermes
      - name: Lint adapters
        run: uv run ruff check adapters/
      - name: Test adapters
        run: uv run pytest adapters/

  typescript:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20"]
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
